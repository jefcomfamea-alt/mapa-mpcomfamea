<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ingreso al Sistema</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f0f2f5;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .login{
            width:360px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 15px rgba(0,0,0,.2);
        }

        h2{
            text-align:center;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:10px;
            margin-bottom:15px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:10px;
            background:#0b5ed7;
            color:white;
            border:none;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#084298;
        }
    </style>
</head>

<body>

<div class="login">

<h2>Mapa de Medidas de Protección</h2>

<form method="post">

{% csrf_token %}

{{ form.as_p }}

<button type="submit">
Ingresar
</button>

</form>

</div>

</body>
</html>
