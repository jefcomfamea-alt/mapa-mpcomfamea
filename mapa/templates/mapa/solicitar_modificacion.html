<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Solicitar Modificación</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
}

.contenedor{
    width:700px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    color:#2E6B2E;
}

button{
    background:#0d6efd;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:5px;
    cursor:pointer;
}

a{
    text-decoration:none;
    margin-left:20px;
}

textarea{
    width:100%;
}

</style>

</head>

<body>

<div class="contenedor">

<h2>Solicitud de Modificación</h2>

<p>
<b>Caso:</b> {{ caso.beneficiario }}
</p>

<form method="POST">

{% csrf_token %}

{{ form.as_p }}

<button type="submit">
Enviar Solicitud
</button>

<a href="{% url 'gestion_casos' %}">
Cancelar
</a>

</form>

</div>

</body>

</html>
