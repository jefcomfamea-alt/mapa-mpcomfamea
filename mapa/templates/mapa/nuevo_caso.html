<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Caso</title>

    <style>

        body{
            font-family:Arial, Helvetica, sans-serif;
            margin:40px;
            background:#f5f5f5;
        }

        h2{
            color:#0d6efd;
        }

        form{
            background:white;
            padding:20px;
            border-radius:10px;
            max-width:700px;
        }

        p{
            margin-bottom:15px;
        }

        input,select{
            width:100%;
            padding:8px;
        }

        button{
            background:#0d6efd;
            color:white;
            border:none;
            padding:10px 20px;
            cursor:pointer;
            border-radius:5px;
        }

    </style>

</head>

<body>

<h2>Registrar Nuevo Caso</h2>

<form method="post">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">

        Guardar Caso

    </button>

</form>

</body>

</html>
