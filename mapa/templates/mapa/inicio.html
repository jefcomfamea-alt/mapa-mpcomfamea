{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Mapa Web de Comisarías</title>

    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <style>

        body{
            margin:0;
            padding:0;
            font-family:Arial, Helvetica, sans-serif;
        }

        h1{
            text-align:center;
            background:#0d6efd;
            color:white;
            padding:10px;
            margin:0;
        }

        #map{
            width:100%;
            height:90vh;
        }

    </style>

</head>

<body>

<h1>Mapa Web de Comisarías</h1>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// ====================================
// CREAR EL MAPA
// ====================================

var map = L.map('map').setView([-12.02224, -77.00984], 14);

L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: "© OpenStreetMap"
}).addTo(map);


// ====================================
// CAPA COMISARÍAS
// ====================================

fetch("/static/mapa/comisarias.geojson")
.then(response => response.json())
.then(data => {

    L.geoJSON(data, {

        onEachFeature: function(feature, layer){

            let popup = "<h3>COMISARÍA</h3><hr>";

            for(let campo in feature.properties){
                popup += "<b>" + campo + ":</b> " + feature.properties[campo] + "<br>";
            }

            layer.bindPopup(popup);

        }

    }).addTo(map);

});


// ====================================
// CAPA MONITOREO CASOS
// ====================================

fetch("/static/mapa/monitoreo_casos.geojson")
.then(response => response.json())
.then(data => {

    L.geoJSON(data, {

        pointToLayer: function(feature, latlng){

            console.log(feature.properties);
            
            let riesgo = feature.properties["NIVEL RIESGO"];

            let color = "gray";

            if(riesgo=="LEVE"){
                color="#00b050";
}
else if(riesgo=="MODERADO"){
    color="#ffd966";
}
else if(riesgo=="SEVERO1"){
    color="#ff0000";
}
else if(riesgo=="SEVERO2"){
    color="#990000";
}
else if(riesgo=="NO DETERMINADO"){
    color="#808080";
            }

            return L.circleMarker(latlng,{
                radius:7,
                fillColor:color,
                color:"#000",
                weight:1,
                opacity:1,
                fillOpacity:0.9
            });

        },

        onEachFeature:function(feature,layer){

            let texto="";

            for(let campo in feature.properties){
                texto += "<b>"+campo+":</b> "+feature.properties[campo]+"<br>";
            }

            layer.bindPopup(texto);

        }

    }).addTo(map);

});

//==============================
// CAMARAS DE VIDEOVIGILANCIA
//==============================

fetch("/static/mapa/camaras de videovigilancia.geojson")
.then(response => response.json())
.then(data=>{

    L.geoJSON(data,{

        pointToLayer:function(feature,latlng){

            return L.circleMarker(latlng,{
                radius:6,
                fillColor:"blue",
                color:"#000",
                weight:1,
                opacity:1,
                fillOpacity:0.9
            });

        },

        onEachFeature:function(feature,layer){

            let texto="";

            for(let campo in feature.properties){
                texto+="<b>"+campo+":</b> "+feature.properties[campo]+"<br>";
            }

            layer.bindPopup(texto);

        }

    }).addTo(map);

    });

    //==============================
// LIMITE DISTRITAL
//==============================


fetch("/static/mapa/limite_distrital inei 2025.geojson")
.then(response=>response.json())
.then(data=>{

    L.geoJSON(data,{

        style:{
            color:"black",
            weight:3,
            fill:false
        }

    }).addTo(map);

    });

    //==============================
// LIMITE DE COMISARIAS
//==============================

fetch("/static/mapa/limite de comisarias.geojson")
.then(response=>response.json())
.then(data=>{

    L.geoJSON(data,{

        style:{
            color:"orange",
            weight:2,
            fill:false
        }

    }).addTo(map);

});

</script>

</body>

</html>
